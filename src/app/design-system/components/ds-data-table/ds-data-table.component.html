<div class="data-table" [ngClass]="themeService.theme()">
  <table>
    <thead>
      <tr>
        @for (column of columns; track column) {
          <th>{{ column.header }}</th>
        }
      </tr>
    </thead>
    <tbody>
      @for (row of data; track row) {
        <tr>
          @for (column of columns; track column) {
            <td>{{ row[column.field] }}</td>
          }
        </tr>
      }
    </tbody>
  </table>
</div>
