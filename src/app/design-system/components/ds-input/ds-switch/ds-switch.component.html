<div class="form-group">
  <label [for]="id">{{ label }}</label>
  <div class="input-wrapper">
    <input
      type="checkbox"
      role="switch"
      [id]="id"
      class="input-switch"
      [ngClass]="{
        'dark-mode': themeService.theme() === 'dark',
        'light-mode': themeService.theme() === 'light',
        error: !!errorMessage,
      }"
      [checked]="value"
      [attr.aria-required]="ariaRequired"
      [attr.aria-invalid]="!!errorMessage"
      [attr.aria-describedby]="errorMessage ? 'error-msg' : null"
      [disabled]="disabled"
      (change)="handleInput($event)"
      (blur)="handleBlur()"
      />
      <div class="switch-icons">
        @if (iconOn && !value) {
          <div class="switch-icon" #iconOnContainer></div>
        }
        @if (iconOff && !value) {
          <div
            class="switch-icon"
            #iconOffContainer
          ></div>
        }
      </div>
    </div>
    @if (errorMessage) {
      <div class="error-message" id="error-msg">
        {{ errorMessage }}
      </div>
    }
  </div>
