<nav aria-label="breadcrumb">
  <ol class="breadcrumb" [ngClass]="themeService.theme()">
    @for (item of items; track item; let last = $last) {
      <li
        class="breadcrumb-item"
        [ngClass]="{ active: last }"
        >
        @if (!last) {
          <a [href]="item.url">{{ item.label }}</a>
        }
        @if (last) {
          {{ item.label }}
        }
      </li>
    }
  </ol>
</nav>
